name: sc-orga-toolbox

services:
    db:
        image: mariadb:11.4
        restart: unless-stopped
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MARIADB_DATABASE: ${DB_NAME}
            MARIADB_USER: ${DB_USER}
            MARIADB_PASSWORD: ${DB_PASSWORD}
        volumes:
            - sc_db_data:/var/lib/mysql
        networks:
            - sc_internal
        healthcheck:
            test: ['CMD-SHELL', 'healthcheck.sh --connect --innodb_initialized']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '3'

    webapp:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - .env.prod
        environment:
            DB_HOST: db
            DB_PORT: 3306
            HOSTNAME: 0.0.0.0
            PORT: 3000
        expose:
            - '3000'
        networks:
            - sc_internal
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://127.0.0.1:3000/api/health').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '3'

    nginx:
        image: nginx:1.28.0-alpine
        restart: unless-stopped
        ports:
            - '127.0.0.1:${NGINX_HOST_PORT:?NGINX_HOST_PORT muss gesetzt sein}:80'
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - sc_internal
        depends_on:
            webapp:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/api/health || exit 1']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '3'

    migrate:
        build:
            context: .
            dockerfile: Dockerfile
            target: migrate
        env_file:
            - .env.prod
        environment:
            DB_HOST: db
            DB_PORT: 3306
        networks:
            - sc_internal
        depends_on:
            db:
                condition: service_healthy
        restart: 'no'

volumes:
    sc_db_data:
        name: sc_db_data

networks:
    sc_internal:
        name: sc_internal
        driver: bridge
